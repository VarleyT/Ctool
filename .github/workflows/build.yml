name: Project Build and Release (Node 24 Optimized)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 全局开启 Node 24 运行环境以消除弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 任务1：构建浏览器扩展及 Web 平台
  build-web-extensions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # 升级至 v4 以支持更高版本 Node
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 显式指定使用 Node.js 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm run build

      - name: Build Extensions and Web
        run: |
          pnpm --filter ctool-adapter-chrome run platform-release
          pnpm --filter ctool-adapter-edge run platform-release
          pnpm --filter ctool-adapter-firefox run platform-release
          pnpm --filter ctool-adapter-utools run platform-release
          pnpm --filter ctool-adapter-web run platform-release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-extensions-dist
          path: |
            **/dist/**
            **/release/**

  # 任务2：构建 Tauri 桌面端 (Windows)
  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm run build

      - name: Build Tauri Desktop
        run: pnpm --filter ctool-adapter-tauri run platform-release

      - name: Upload Tauri Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-dist
          # 修正路径：必须包含 packages 目录层级
          path: packages/ctool-adapter/tauri/src-tauri/target/release/bundle/**
          if-no-files-found: error # 若路径依然错误，直接报错提醒
